# LoRA 训练配置模板：默认适配 Qwen2.5-1.5B-Instruct
model:
  name_or_path: Qwen/Qwen2.5-1.5B-Instruct
  trust_remote_code: true
  torch_dtype: auto
  device_map: auto

data:
  train_path: data/processed/instruction_train.jsonl
  eval_path:
  max_seq_length: 1024
  eval_ratio: 0.05
  max_samples:
  train_on_prompt: false

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  rank_pattern:

training:
  output_dir: outputs/qwen25_lora
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  save_total_limit: 2
  bf16: false
  fp16: true
  gradient_checkpointing: true
  optim: adamw_torch
  report_to: none
  seed: 42

run:
  dry_run: true
  qlora: false

