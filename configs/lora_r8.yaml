# 普通 LoRA r=8 baseline 配置
model:
  name_or_path: Qwen/Qwen2.5-1.5B-Instruct
  trust_remote_code: true
  torch_dtype: float16
  # 普通 LoRA 训练不要使用 auto offload；否则小显存机器上可能出现 meta/cuda 反传错误。
  device_map:

data:
  # 支持 instruction JSONL，也支持 GSM8K 风格 question/answer JSONL。
  train_file: data/processed/instruction_train.jsonl
  eval_file:
  format: auto
  # RTX 3050 Ti 4GB 建议先用 256 跑通 baseline，再逐步调大。
  max_length: 256
  max_samples:
  max_eval_samples:
  eval_ratio: 0.05
  train_on_prompt: false

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
  bias: none

training:
  output_dir: outputs/lora_r8_qwen25
  seed: 42
  num_train_epochs: 1
  max_steps: -1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  save_total_limit: 2
  fp16: true
  bf16: false
  gradient_checkpointing: true
  optim: adamw_torch
  report_to: none

importance:
  # 用少量 batch 做 LoRA 梯度采样，不更新模型参数。
  output_file: results/importance/qwen25_1_5b_instruction_importance.json
  num_batches: 4
  max_samples: 8
  min_rank: 2
  max_rank: 32
  rank_step: 2

evaluation:
  max_samples: 32
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  output_file: experiments/runs/lora_r8_eval.json
